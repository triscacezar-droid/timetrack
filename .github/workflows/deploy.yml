name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from repo secrets
        env:
          CLIENT_ID: ${{ secrets.TIMETRACK_CLIENT_ID }}
          SPREADSHEET_ID: ${{ secrets.TIMETRACK_SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.TIMETRACK_SHEET_NAME }}
        run: |
          cat > config.js <<EOF
          const CONFIG = {
            CLIENT_ID: "${CLIENT_ID}",
            SPREADSHEET_ID: "${SPREADSHEET_ID}",
            SHEET_NAME: "${SHEET_NAME:-Sheet1}",
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
