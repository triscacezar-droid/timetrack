<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TimeTrack</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#5b8cff" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>TimeTrack</h1>
      <div id="auth-area">
        <select id="theme-select" title="Theme"></select>
        <button id="signin-btn">Sign in with Google</button>
        <div id="signed-in" class="hidden">
          <span id="user-email"></span>
          <button id="signout-btn">Sign out</button>
        </div>
      </div>
    </header>

    <div id="setup-banner" class="banner hidden">
      <strong>Setup needed:</strong> open <code>config.js</code> and fill in your Google OAuth Client ID
      and Spreadsheet ID. See <code>README.md</code> for step-by-step instructions.
    </div>

    <main>
      <section class="card timer-card">
        <div class="timer-display" id="timer-display">00:00:00</div>

        <div class="field-row">
          <label for="activity-select">Activity</label>
          <select id="activity-select"></select>
          <button id="manage-activities-btn" title="Manage activities">⚙</button>
        </div>

        <div class="field-row">
          <label>Countdown</label>
          <div class="duration-inputs">
            <div class="duration-field">
              <input type="number" id="duration-hours" min="0" value="0" />
              <span class="hint">hr</span>
            </div>
            <div class="duration-field">
              <input type="number" id="duration-minutes" min="0" max="59" value="25" />
              <span class="hint">min</span>
            </div>
            <div class="duration-field">
              <input type="number" id="duration-seconds" min="0" max="59" value="0" />
              <span class="hint">sec</span>
            </div>
          </div>
          <div class="preset-buttons">
            <button data-min="5">5m</button>
            <button data-min="15">15m</button>
            <button data-min="25">25m</button>
            <button data-min="60">1h</button>
          </div>
        </div>

        <div class="field-row">
          <label for="bell-preset-select">Bell preset</label>
          <select id="bell-preset-select"></select>
          <button id="manage-presets-btn" title="Manage bell presets">⚙</button>
        </div>

        <div class="timer-controls">
          <button id="start-btn" class="primary">Start</button>
          <button id="pause-btn" class="hidden">Pause</button>
          <button id="resume-btn" class="hidden">Resume</button>
          <button id="stop-btn" class="hidden danger">Stop &amp; Log</button>
        </div>

        <div id="status-msg" class="status"></div>

        <div id="quality-picker" class="quality-picker hidden">
          <span class="hint">How did that go? (optional)</span>
          <div class="quality-buttons" id="quality-buttons"></div>
          <button id="quality-skip-btn">Skip</button>
        </div>
      </section>

      <section class="card manual-card">
        <h2>Add entry manually</h2>
        <form id="manual-form">
          <div class="field-row">
            <label for="manual-timezone">Timezone</label>
            <select id="manual-timezone"></select>
          </div>
          <div class="field-row">
            <label for="manual-activity">Activity</label>
            <select id="manual-activity"></select>
          </div>
          <div class="field-row two-col">
            <div>
              <label for="manual-date">Start date</label>
              <input type="date" id="manual-date" required />
            </div>
            <div>
              <label for="manual-start">Start time</label>
              <input type="time" id="manual-start" required />
            </div>
          </div>
          <div class="field-row two-col">
            <div>
              <label for="manual-duration">Duration (minutes)</label>
              <input type="number" id="manual-duration" min="1" value="30" required />
            </div>
            <div>
              <label for="manual-end">End time</label>
              <input type="time" id="manual-end" required />
            </div>
          </div>
          <div class="field-row">
            <span class="hint" id="manual-end-badge"></span>
            <button type="button" id="manual-now-btn">Reset to now</button>
          </div>

          <div class="timeline-chart">
            <div class="timeline-track" id="timeline-track">
              <div class="timeline-now-marker" id="timeline-now-marker"></div>
              <div class="timeline-bar" id="timeline-bar">
                <div class="timeline-handle" id="timeline-handle-right" title="Drag to change duration"></div>
              </div>
            </div>
            <div class="timeline-hours" id="timeline-hours"></div>
          </div>

          <div class="field-row">
            <label for="manual-notes">Notes (optional)</label>
            <input type="text" id="manual-notes" placeholder="What were you doing?" />
          </div>
          <div class="field-row">
            <label>Quality (optional)</label>
            <div class="quality-buttons" id="manual-quality-buttons"></div>
          </div>
          <button type="submit" class="primary">Add entry</button>
        </form>
      </section>

      <section class="card log-card">
        <div class="log-header">
          <h2>Recent entries</h2>
          <button id="refresh-log-btn">Refresh</button>
        </div>
        <div id="log-list" class="log-list"></div>
      </section>
    </main>

    <div id="manage-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Manage activities</h2>
        <ul id="activities-list"></ul>
        <div class="field-row">
          <input type="text" id="new-activity-input" placeholder="New activity name" />
          <button id="add-activity-btn">Add</button>
        </div>
        <button id="close-modal-btn">Done</button>
      </div>
    </div>

    <div id="bell-presets-modal" class="modal hidden">
      <div class="modal-content wide">
        <h2>Bell presets</h2>
        <div id="presets-list"></div>
        <button id="add-preset-btn">+ New preset</button>
        <hr />
        <button id="close-presets-modal-btn">Done</button>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
